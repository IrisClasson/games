<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loke & Tyr</title>
  <link rel="stylesheet" href="styles/styles.css">

    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: Arial, sans-serif;
            background-image: url('images/cardboard.jpg');
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }
        #game {
            display: grid;
            grid-template-columns: repeat(3, 150px);
            grid-gap: 20px;
            margin-top: 50px;
        }
        .hole {
            width: 150px;
            height: 150px;
            background-color: #ccc;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            transition: background-color 0.3s ease;
        }
        .hole.active.tyr {
            background-color: #4CAF50; /* Green for Tyr */
        }
        .hole.active.loke {
            background-color: #9C27B0; /* Purple for Loke */
        }
        .mole {
            width: 100px;
            height: 130px;
            position: absolute;
            top: 10px;
            left: 10px;
            display: none;
            background-size: cover;
            background-position: center;
        }
        .loke-mole {
            background-image: url('images/loke.png');
        }
        .tyr-mole {
            background-image: url('images/tyr.png');
        }
        #congratsWindow {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            z-index: 1000;
        }
        #congratsContent {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Tittut</h1>
    <div class="info-box">
        <h3>How to Play</h3>
        <p>SPACE: Wack Tyr</p>
        <p>ENTER: Wack Loke</p>
    </div>
    <div id="game">
        <div class="hole" id="hole1"><div class="mole"></div></div>
        <div class="hole" id="hole2"><div class="mole"></div></div>
        <div class="hole" id="hole3"><div class="mole"></div></div>
        <div class="hole" id="hole4"><div class="mole"></div></div>
        <div class="hole" id="hole5"><div class="mole"></div></div>
        <div class="hole" id="hole6"><div class="mole"></div></div>
    </div>

    <h2>Score: <span id="score">0</span></h2>
    <div id="congratsWindow">
        <div id="congratsContent">
            <h2>Congratulations!</h2>
            <p id="finalScore"></p>
            <button onclick="startGame()">Play Again</button>
        </div>
    </div>

    <script>
        const holes = document.querySelectorAll('.hole');
        let score = 0;
        let lastHole;
        let timeUp = false;
        const congratsWindow = document.getElementById('congratsWindow');
        const finalScore = document.getElementById('finalScore');

        function randomTime(min, max) {
            return Math.round(Math.random() * (max - min) + min);
        }

        function randomHole(holes) {
            const idx = Math.floor(Math.random() * holes.length);
            const hole = holes[idx];
            if (hole === lastHole) {
                return randomHole(holes);
            }
            lastHole = hole;
            return hole;
        }

        function showMole() {
            const time = randomTime(1000, 2000);
            const hole = randomHole(holes);
            const mole = hole.querySelector('.mole');
            
            // Randomly choose between Loke and Tyr
            const isLoke = Math.random() < 0.5;
            mole.classList.toggle('loke-mole', isLoke);
            mole.classList.toggle('tyr-mole', !isLoke);
            
            hole.classList.add('active');
            hole.classList.toggle('loke', isLoke);
            hole.classList.toggle('tyr', !isLoke);
            mole.style.display = 'block';

            setTimeout(() => {
                mole.style.display = 'none';
                hole.classList.remove('active', 'loke', 'tyr');
                mole.classList.remove('loke-mole', 'tyr-mole');
                if (!timeUp) showMole();
            }, time);
        }

        function startGame() {
            score = 0;
            document.getElementById('score').textContent = score;
            timeUp = false;
            congratsWindow.style.display = 'none';
            showMole();
            setTimeout(() => {
                timeUp = true;
                showCongrats();
            }, 30000); // 30 seconds game duration
        }

        function hitMole(mole) {
            if (mole.style.display === 'block') {
                score++;
                document.getElementById('score').textContent = score;
                mole.style.display = 'none';
                mole.parentNode.classList.remove('active', 'loke', 'tyr');
            }
        }

        function showCongrats() {
            finalScore.textContent = `Your final score: ${score}`;
            congratsWindow.style.display = 'block';
        }

        holes.forEach(hole => {
            hole.addEventListener('click', (e) => {
                const mole = e.target.closest('.mole');
                if (mole) {
                    hitMole(mole);
                }
            });
            
            hole.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const mole = e.target.closest('.mole');
                if (mole) {
                    hitMole(mole);
                }
            });
        });

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                const visibleLokeMole = document.querySelector('.loke-mole[style="display: block;"]');
                if (visibleLokeMole) {
                    hitMole(visibleLokeMole);
                }
            } else if (e.code === 'Enter') {
                const visibleTyrMole = document.querySelector('.tyr-mole[style="display: block;"]');
                if (visibleTyrMole) {
                    hitMole(visibleTyrMole);
                }
            }
        });

        startGame(); // Auto-start the game
    </script>
</body>
</html>

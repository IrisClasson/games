<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Drawing Helper</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        #container {
            position: relative;
            width: 100%;
            height: 100%;
        }
        #cameraFeed, #imageOverlay {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        #imageOverlay {
            object-fit: contain;
            transform-origin: 0 0;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: rgba(255, 255, 255, 0.7);
            padding: 10px;
            border-radius: 10px;
        }
        input[type="file"], input[type="range"] {
            margin-bottom: 10px;
        }
        label {
            color: black;
        }
        #zoomControl {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: rgba(255, 255, 255, 0.7);
            padding: 10px;
            border-radius: 10px;
        }
        #zoomSlider {
            writing-mode: bt-lr;
            -webkit-appearance: slider-vertical;
            width: 8px;
            height: 175px;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
</head>
<body>
    <div id="container">
        <video id="cameraFeed" autoplay playsinline></video>
        <img id="imageOverlay" style="display: none;">
    </div>
    <div id="controls">
        <input type="file" id="imageUpload" accept="image/*">
        <input type="range" id="opacitySlider" min="0" max="1" step="0.1" value="0.5">
        <label for="opacitySlider">Overlay Opacity: <span id="opacityValue">0.5</span></label>
    </div>
    <div id="zoomControl">
        <input type="range" id="zoomSlider" min="0.5" max="3" step="0.1" value="1" orient="vertical">
        <label for="zoomSlider">Zoom</label>
    </div>

    <script>
        const cameraFeed = document.getElementById('cameraFeed');
        const imageOverlay = document.getElementById('imageOverlay');
        const imageUpload = document.getElementById('imageUpload');
        const opacitySlider = document.getElementById('opacitySlider');
        const opacityValue = document.getElementById('opacityValue');
        const zoomSlider = document.getElementById('zoomSlider');
        const container = document.getElementById('container');

        let currentScale = 1;
        let currentPanX = 0;
        let currentPanY = 0;
        let lastPanX = 0;
        let lastPanY = 0;

        // Start camera feed
        async function startCamera() {
            try {
                const constraints = {
                    video: {
                        facingMode: 'environment',
                        width: { ideal: window.innerWidth },
                        height: { ideal: window.innerHeight }
                    }
                };
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                cameraFeed.srcObject = stream;
                
                // Wait for the video to be loaded
                cameraFeed.onloadedmetadata = () => {
                    fitCameraToScreen();
                };
            } catch (err) {
                console.error("Error accessing camera:", err);
                alert("Unable to access the camera. Please ensure you have given permission and try again.");
            }
        }

        function fitCameraToScreen() {
            const { videoWidth, videoHeight } = cameraFeed;
            const { width, height } = container.getBoundingClientRect();
            const widthRatio = width / videoWidth;
            const heightRatio = height / videoHeight;
            const ratio = Math.min(widthRatio, heightRatio);
            
            cameraFeed.style.width = `${videoWidth * ratio}px`;
            cameraFeed.style.height = `${videoHeight * ratio}px`;
            cameraFeed.style.left = `${(width - videoWidth * ratio) / 2}px`;
            cameraFeed.style.top = `${(height - videoHeight * ratio) / 2}px`;
        }

        // Handle image upload
        imageUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    imageOverlay.src = event.target.result;
                    imageOverlay.style.display = 'block';
                    updateOpacity();
                    resetTransform();
                    setupPinchZoom(); // Setup pinch zoom after image is loaded
                };
                reader.readAsDataURL(file);
            }
        });

        // Handle opacity changes
        opacitySlider.addEventListener('input', updateOpacity);

        function updateOpacity() {
            const opacity = opacitySlider.value;
            imageOverlay.style.opacity = opacity;
            opacityValue.textContent = opacity;
        }

        // Handle zoom changes
        zoomSlider.addEventListener('input', () => {
            currentScale = parseFloat(zoomSlider.value);
            updateImageTransform();
        });

        function setupPinchZoom() {
            const hammer = new Hammer(imageOverlay);
            hammer.get('pinch').set({ enable: true });
            hammer.get('pan').set({ direction: Hammer.DIRECTION_ALL });

            hammer.on('pinchstart panstart', () => {
                lastPanX = currentPanX;
                lastPanY = currentPanY;
            });

            hammer.on('pinch', (e) => {
                currentScale = Math.max(0.5, Math.min(e.scale * currentScale, 3));
                zoomSlider.value = currentScale;
                currentPanX = lastPanX + e.deltaX;
                currentPanY = lastPanY + e.deltaY;
                updateImageTransform();
            });

            hammer.on('pan', (e) => {
                currentPanX = lastPanX + e.deltaX / currentScale;
                currentPanY = lastPanY + e.deltaY / currentScale;
                updateImageTransform();
            });

            hammer.on('pinchend panend', () => {
                lastPanX = currentPanX;
                lastPanY = currentPanY;
            });
        }

        function updateImageTransform() {
            const translateX = currentPanX / currentScale;
            const translateY = currentPanY / currentScale;
            imageOverlay.style.transform = `translate(${translateX}px, ${translateY}px) scale(${currentScale})`;
        }

        function resetTransform() {
            currentScale = 1;
            currentPanX = 0;
            currentPanY = 0;
            lastPanX = 0;
            lastPanY = 0;
            zoomSlider.value = 1;
            updateImageTransform();
        }

        // Start the camera when the page loads
        startCamera();

        // Handle window resize
        window.addEventListener('resize', fitCameraToScreen);
    </script>
</body>
</html>

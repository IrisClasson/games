<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Måla Bokstäver - Dagens Bokstav</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="color-game.css">
    <link rel="stylesheet" href="mode-switcher.css">
</head>
<body>
    <!-- Letter Selection Modal -->
    <div id="letter-modal" class="letter-modal">
        <div class="letter-modal-content">
            <div class="letter-modal-header">
                <h2 class="letter-modal-title">Välj en bokstav</h2>
                <button id="letter-modal-close" class="letter-modal-close">&times;</button>
            </div>
            <div id="letter-grid" class="letter-grid"></div>
        </div>
    </div>

    <div id="game-container">
        <!-- Unified Header -->
        <div id="game-header" class="unified-game-header">
            <div class="header-left">
                <a href="index.html" class="btn-back-arrow">←</a>
            </div>
            <div class="header-center">
                <h2 id="game-title">Måla Bokstäver</h2>
            </div>
            <div class="header-right">
                <!-- Mode Switcher -->
                <div class="mode-selector">
                    <button id="mode-dropdown-btn" class="mode-dropdown-btn">Dagens bokstav</button>
                    <div id="mode-dropdown-menu" class="mode-dropdown-menu">
                        <div id="mode-daily" class="mode-option">Dagens bokstav</div>
                        <div id="mode-select" class="mode-option">Välj bokstav...</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Game area -->
        <div id="game-area">
            <!-- Progress bar -->
            <div id="progress-container">
                <div id="progress-label">Färdigmålat:</div>
                <div id="progress-bar-outer">
                    <div id="progress-bar-inner" style="width: 0%"></div>
                </div>
                <div id="progress-text">0%</div>
            </div>

            <!-- Color palette -->
            <div id="color-palette">
                <button class="color-btn active" data-color="#FF6B9D" style="background-color: #FF6B9D;" title="Rosa"></button>
                <button class="color-btn" data-color="#9D4EDD" style="background-color: #9D4EDD;" title="Lila"></button>
                <button class="color-btn" data-color="#00CED1" style="background-color: #00CED1;" title="Blå"></button>
                <button class="color-btn" data-color="#FFD700" style="background-color: #FFD700;" title="Gul"></button>
                <button class="color-btn" data-color="#FF6347" style="background-color: #FF6347;" title="Orange"></button>
            </div>

            <!-- Canvas -->
            <div id="canvas-container">
                <canvas id="letter-canvas"></canvas>
            </div>

            <!-- Sparkles container -->
            <div id="sparkles-container"></div>
        </div>

        <!-- Celebration screen -->
        <div id="celebration" class="hidden">
            <div class="celebration-content">
                <h1>🎨 Fantastiskt! 🎨</h1>
                <p>Du målade färdigt bokstaven!</p>
                <div class="button-group">
                    <button id="play-again-btn" class="btn btn-primary">Måla igen</button>
                    <a href="index.html" class="btn btn-secondary">Hem</a>
                </div>
            </div>
        </div>
    </div>

    <script src="mode-switcher.js"></script>
    <script src="color-game.js"></script>
</body>
</html>

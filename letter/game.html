<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bokstavsspel - Fånga R</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="game.css">
    <link rel="stylesheet" href="mode-switcher.css">
</head>
<body>
    <!-- Letter Selection Modal -->
    <div id="letter-modal" class="letter-modal">
        <div class="letter-modal-content">
            <div class="letter-modal-header">
                <h2 class="letter-modal-title">Välj en bokstav</h2>
                <button id="letter-modal-close" class="letter-modal-close">&times;</button>
            </div>
            <div id="letter-grid" class="letter-grid"></div>
        </div>
    </div>

    <div id="game-container">
        <!-- Unified Header with score and timer -->
        <div id="game-header" class="unified-game-header">
            <div class="header-left">
                <a href="index.html" class="btn-back-arrow">←</a>
            </div>
            <div class="header-center">
                <div id="score-display">
                    <span class="label">Poäng:</span>
                    <span id="score">0</span>
                </div>
                <div id="timer-display">
                    <span class="label">Tid:</span>
                    <span id="timer">60</span>
                </div>
            </div>
            <div class="header-right">
                <!-- Mode Switcher -->
                <div class="mode-selector">
                    <button id="mode-dropdown-btn" class="mode-dropdown-btn">Dagens bokstav</button>
                    <div id="mode-dropdown-menu" class="mode-dropdown-menu">
                        <div id="mode-daily" class="mode-option">Dagens bokstav</div>
                        <div id="mode-select" class="mode-option">Välj bokstav...</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Game area where letters fall -->
        <div id="game-area"></div>

        <!-- Game over screen (hidden initially) -->
        <div id="game-over" class="hidden">
            <div class="game-over-content">
                <h1>Spelet är slut!</h1>
                <p class="final-score">Din poäng: <span id="final-score">0</span></p>
                <div class="button-group">
                    <button id="restart-btn" class="btn btn-primary">Spela igen</button>
                    <a href="index.html" class="btn btn-secondary">Tillbaka</a>
                </div>
            </div>
        </div>
    </div>

    <script src="mode-switcher.js"></script>
    <script src="game.js"></script>
</body>
</html>

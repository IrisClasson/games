<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ordspel - Dagens Bokstav</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="word-game.css">
</head>
<body>
    <div id="game-container">
        <!-- Header -->
        <div id="game-header">
            <div class="header-content">
                <h2 id="round-display">Runda <span id="current-round">1</span>/5</h2>
                <a href="index.html" class="btn-back">Tillbaka</a>
            </div>
        </div>

        <!-- Game area -->
        <div id="game-area">
            <!-- Jar container -->
            <div id="jar-container">
                <div id="jar-label">Ord som börjar med</div>
                <div id="jar-letter">R</div>
                <div id="jar" class="drop-zone">
                    <div class="jar-body">
                        <div class="jar-lid"></div>
                        <div class="jar-main">
                            <div id="jar-fill" class="jar-fill"></div>
                        </div>
                        <div class="jar-shadow"></div>
                    </div>
                </div>
            </div>

            <!-- Word cards -->
            <div id="words-container">
                <div class="word-card" draggable="true" data-word="räv">
                    <span class="word-text">räv</span>
                </div>
                <div class="word-card" draggable="true" data-word="hus">
                    <span class="word-text">hus</span>
                </div>
                <div class="word-card" draggable="true" data-word="bil">
                    <span class="word-text">bil</span>
                </div>
            </div>

            <div id="instruction">Klicka på ett ord för att höra det. Dra rätt ord till burken!</div>
        </div>

        <!-- Fireworks container -->
        <div id="fireworks-container"></div>

        <!-- Celebration screen -->
        <div id="celebration" class="hidden">
            <div class="celebration-content">
                <h1>🎉 Grattis! 🎉</h1>
                <p>Du klarade alla 5 rundor!</p>
                <div class="button-group">
                    <button id="play-again-btn" class="btn btn-primary">Spela igen</button>
                    <a href="index.html" class="btn btn-secondary">Hem</a>
                </div>
            </div>
        </div>
    </div>

    <script src="word-game.js"></script>
</body>
</html>

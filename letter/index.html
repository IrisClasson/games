<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dagens Bokstav</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="mode-switcher.css">
</head>
<body>
    <!-- Mode Switcher -->
    <div class="mode-selector" style="position: fixed; top: 20px; right: 20px; z-index: 100;">
        <button id="mode-dropdown-btn" class="mode-dropdown-btn">Dagens bokstav</button>
        <div id="mode-dropdown-menu" class="mode-dropdown-menu">
            <div id="mode-daily" class="mode-option">Dagens bokstav</div>
            <div id="mode-select" class="mode-option">Välj bokstav...</div>
        </div>
    </div>

    <!-- Letter Selection Modal -->
    <div id="letter-modal" class="letter-modal">
        <div class="letter-modal-content">
            <div class="letter-modal-header">
                <h2 class="letter-modal-title">Välj en bokstav</h2>
                <button id="letter-modal-close" class="letter-modal-close">&times;</button>
            </div>
            <div id="letter-grid" class="letter-grid"></div>
        </div>
    </div>

    <div class="container-fluid d-flex align-items-center justify-content-center min-vh-100">
        <div class="text-center">
            <h1 class="title mb-4">Dagens Bokstav</h1>
            <div class="letter-container">
                <div id="letter" class="letter">A</div>
            </div>
            <p class="date mt-4" id="date"></p>
            <div class="button-group mt-4">
                <a href="game.html" class="btn btn-game">Fånga Bokstäver</a>
                <a href="word-game.html" class="btn btn-game">Ordspel</a>
                <a href="color-game.html" class="btn btn-game">Måla Bokstäver</a>
                <a href="puzzle-game.html" class="btn btn-game">Pussel</a>
                <a href="rolodex-game.html" class="btn btn-game">Rolodex</a>
            </div>
        </div>
    </div>
    <script src="mode-switcher.js"></script>
    <script src="app.js"></script>
</body>
</html>

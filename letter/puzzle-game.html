<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pussel - Dagens Bokstav</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="puzzle-game.css">
    <link rel="stylesheet" href="mode-switcher.css">
</head>
<body>
    <!-- Letter Selection Modal -->
    <div id="letter-modal" class="letter-modal">
        <div class="letter-modal-content">
            <div class="letter-modal-header">
                <h2 class="letter-modal-title">Välj en bokstav</h2>
                <button id="letter-modal-close" class="letter-modal-close">&times;</button>
            </div>
            <div id="letter-grid" class="letter-grid"></div>
        </div>
    </div>

    <div id="game-container">
        <!-- Unified Header -->
        <div id="game-header" class="unified-game-header">
            <div class="header-left">
                <a href="index.html" class="btn-back-arrow">←</a>
            </div>
            <div class="header-center">
                <h2 id="game-title">Pussel</h2>
            </div>
            <div class="header-right">
                <!-- Mode Switcher -->
                <div class="mode-selector">
                    <button id="mode-dropdown-btn" class="mode-dropdown-btn">Dagens bokstav</button>
                    <div id="mode-dropdown-menu" class="mode-dropdown-menu">
                        <div id="mode-daily" class="mode-option">Dagens bokstav</div>
                        <div id="mode-select" class="mode-option">Välj bokstav...</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Game area -->
        <div id="game-area">
            <!-- Target area (outline showing where pieces should go) -->
            <div id="target-container">
                <div id="target-outline"></div>
            </div>

            <!-- Puzzle pieces container -->
            <div id="pieces-container">
                <!-- Pieces will be dynamically created here -->
            </div>

            <!-- Hidden canvas for generating letter -->
            <canvas id="hidden-canvas" style="display: none;"></canvas>
        </div>

        <!-- Celebration screen -->
        <div id="celebration" class="hidden">
            <div class="celebration-content">
                <h1>🧩 Fantastiskt! 🧩</h1>
                <p>Du klarade pusslet!</p>
                <div class="button-group">
                    <button id="play-again-btn" class="btn btn-primary">Spela igen</button>
                    <a href="index.html" class="btn btn-secondary">Hem</a>
                </div>
            </div>
        </div>
    </div>

    <script src="mode-switcher.js"></script>
    <script src="puzzle-game.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pussel - Dagens Bokstav</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="puzzle-game.css">
</head>
<body>
    <div id="game-container">
        <!-- Header -->
        <div id="game-header">
            <div class="header-content">
                <h2 id="game-title">Pussel - Dagens Bokstav</h2>
                <a href="index.html" class="btn-back">Tillbaka</a>
            </div>
        </div>

        <!-- Game area -->
        <div id="game-area">
            <!-- Target area (outline showing where pieces should go) -->
            <div id="target-container">
                <div id="target-outline"></div>
            </div>

            <!-- Puzzle pieces container -->
            <div id="pieces-container">
                <!-- Pieces will be dynamically created here -->
            </div>

            <!-- Hidden canvas for generating letter -->
            <canvas id="hidden-canvas" style="display: none;"></canvas>
        </div>

        <!-- Celebration screen -->
        <div id="celebration" class="hidden">
            <div class="celebration-content">
                <h1>🧩 Fantastiskt! 🧩</h1>
                <p>Du klarade pusslet!</p>
                <div class="button-group">
                    <button id="play-again-btn" class="btn btn-primary">Spela igen</button>
                    <a href="index.html" class="btn btn-secondary">Hem</a>
                </div>
            </div>
        </div>
    </div>

    <script src="puzzle-game.js"></script>
</body>
</html>

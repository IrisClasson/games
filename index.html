<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Loke and Tyr adventure 1</title>
  <style>
    body {
      background-image: url('images/mainbg.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      height: 100vh;
      width: 100vw;
    }
    #lifeBar {
      position: absolute;
      top: 10px;
      left: 10px;
      width: 200px;
      height: 20px;
      background-color: #ddd;
      border: 1px solid #000;
    }
    #lifeBarFill {
      height: 100%;
      background-color: #0f0;
      transition: width 0.3s;
    }
    #velocityToggle {
      position: absolute;
      top: 40px;
      left: 10px;
      font-size: 14px;
      color: white;
      background-color: rgba(0, 0, 0, 0.5);
      padding: 5px;
      border-radius: 5px;
    }
    #menu {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background-color: rgba(255, 255, 255, 0.8);
      padding: 20px;
      border-radius: 10px;
      text-align: center;
    }
    button {
      margin: 10px;
      padding: 10px 20px;
      font-size: 16px;
    }
    #timer {
      position: absolute;
      top: 10px;
      right: 10px;
      font-size: 20px;
      font-weight: bold;
    }
    #congratsWindow {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.7);
    z-index: 1000;
  }
  </style>
</head>
<body>
  <div id="menu">
    <h2>Loke och Tyr välj äventyr!</h2>
    <button onclick="window.location.href='adventure1.html'">Molnresan</button>
    <button onclick="window.location.href='adventure2.html'">Hoppa i sängen</button>
    <button onclick="window.location.href='adventure3.html'">Köttbullar</button>
    <button onclick="window.location.href='adventure4.html'">Tittut</button>
    <button onclick="window.location.href='adventure6.html'">Tyst!</button>
    <button onclick="window.location.href='drawing-helper.html'">Rita</button>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Boys Living Room Escape</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
    canvas {
      display: block;
      background-color: #f0f0f0;
    }
    #lifeBar {
      position: absolute;
      top: 10px;
      left: 10px;
      width: 200px;
      height: 20px;
      background-color: #ddd;
      border: 1px solid #000;
    }
    #lifeBarFill {
      height: 100%;
      background-color: #0f0;
      transition: width 0.3s;
    }
    #menu {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background-color: rgba(255, 255, 255, 0.8);
      padding: 20px;
      border-radius: 10px;
      text-align: center;
    }
    button {
      margin: 10px;
      padding: 10px 20px;
      font-size: 16px;
    }
    #timer {
      position: absolute;
      top: 10px;
      right: 10px;
      font-size: 20px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div id="lifeBar"><div id="lifeBarFill"></div></div>
  <div id="timer">Time: 0s</div>
  <canvas id="gameCanvas"></canvas>
  <div id="menu">
    <h2>Choose Room Length</h2>
    <button onclick="startGame('short')">Short</button>
    <button onclick="startGame('medium')">Medium</button>
    <button onclick="startGame('long')">Long</button>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const lifeBarFill = document.getElementById('lifeBarFill');
    const timerElement = document.getElementById('timer');
    const menu = document.getElementById('menu');

    // Set canvas size
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // Load images
    const boysImg = new Image();
    boysImg.src = 'images/boys.png';
    const doorImg = new Image();
    doorImg.src = 'images/door.png';

    // boys settings
    const boysAspectRatio = 0.75;
    const boysHeight = 150;
    const boysWidth = boysHeight * boysAspectRatio;

    const boys = {
      x: 100,
      y: canvas.height / 2,
      width: boysWidth,
      height: boysHeight,
      lives: 10
    };

    let obstacles = [];
    const obstacleWidth = 60;
    const gapSize = 300;
    let gameOver = false;
    let isMoving = false;
    let gameTime = 0;
    let roomLength = 0;
    let doorPosition = 0;

    let touchStartY = 0;
    let isTouching = false;

    // New variables for smooth movement
    let upPressed = false;
    let downPressed = false;
    const movementSpeed = 5;

    function startGame(length) {
      menu.style.display = 'none';
      switch (length) {
        case 'short':
          roomLength = 3000;
          break;
        case 'medium':
          roomLength = 6000;
          break;
        case 'long':
          roomLength = 9000;
          break;
      }
      doorPosition = canvas.width + roomLength;
      gameTime = 0;
      boys.x = 100;
      boys.y = canvas.height / 2;
      boys.lives = 10;
      obstacles = [];
      gameOver = false;
      generateInitialObstacles();
      updateLifeBar();
      update();
    }

    function generateObstacles() {
      const obstacleHeight = Math.random() * (canvas.height - gapSize - 100) + 50;
      const gapStartY = Math.random() * (canvas.height - gapSize);
      obstacles.push({
        x: canvas.width,
        gapStartY: gapStartY,
        gapEndY: gapStartY + gapSize,
        heightTop: gapStartY,
        heightBottom: canvas.height - (gapStartY + gapSize),
        hit: false
      });
    }

    function generateInitialObstacles() {
      obstacles = [];
      for (let i = 0; i < 10; i++) {
        generateObstacles();
        obstacles[i].x = canvas.width + i * 500;
      }
    }

    function updateLifeBar() {
      const percentage = (boys.lives / 10) * 100;
      lifeBarFill.style.width = `${percentage}%`;
      lifeBarFill.style.backgroundColor = percentage > 50 ? '#0f0' : percentage > 20 ? '#ff0' : '#f00';
    }

    function update() {
      if (gameOver) return;

      gameTime += 1/60;
      timerElement.textContent = `Time: ${Math.floor(gameTime)}s`;

      // Move boys based on key presses
      if (upPressed) {
        boys.y -= movementSpeed;
      }
      if (downPressed) {
        boys.y += movementSpeed;
      }

      // Keep boys within canvas
      if (boys.y < 0) {
        boys.y = 0;
      } else if (boys.y + boys.height > canvas.height) {
        boys.y = canvas.height - boys.height;
      }

      // Clear the canvas
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      // Create gradient background
      const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
      gradient.addColorStop(0, '#87CEEB');
      gradient.addColorStop(0.5, '#FFA07A');
      gradient.addColorStop(1, '#FF69B4');

      // Fill the canvas with the gradient
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Draw boys
      ctx.drawImage(boysImg, boys.x, boys.y, boys.width, boys.height);

      // Draw obstacles
      obstacles.forEach((obstacle, index) => {
        if (isMoving) {
          obstacle.x -= 2;
        }

        ctx.fillStyle = 'white';

        // Draw top obstacle (ellipse)
        ctx.beginPath();
        ctx.ellipse(
          obstacle.x + obstacleWidth / 2,
          obstacle.heightTop / 2,
          obstacleWidth / 2,
          obstacle.heightTop / 2,
          0,
          0,
          2 * Math.PI
        );
        ctx.fill();

        // Draw bottom obstacle (ellipse)
        ctx.beginPath();
        ctx.ellipse(
          obstacle.x + obstacleWidth / 2,
          canvas.height - obstacle.heightBottom / 2,
          obstacleWidth / 2,
          obstacle.heightBottom / 2,
          0,
          0,
          2 * Math.PI
        );
        ctx.fill();

        // Check for collision
        if (
          boys.x + boys.width > obstacle.x &&
          boys.x < obstacle.x + obstacleWidth &&
          (boys.y < obstacle.heightTop ||
            boys.y + boys.height > obstacle.gapEndY) &&
          !obstacle.hit
        ) {
          obstacle.hit = true;
          boys.lives--;
          updateLifeBar();
          if (boys.lives <= 0) {
            gameOver = true;
            alert("Game Over! The boys couldn't escape the room!");
            return;
          }
        }

        // Remove obstacles that have gone off-screen
        if (obstacle.x + obstacleWidth < 0) {
          obstacles.splice(index, 1);
        }
      });

      // Check if we've finished all obstacles
      if (obstacles.length === 0 || (obstacles[obstacles.length - 1].x + obstacleWidth < boys.x)) {
        gameOver = true;
        const score = boys.lives * 100;
        ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = 'white';
        ctx.font = '48px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(`Grattis! Du klarade det!`, canvas.width / 2, canvas.height / 2 - 50);
        ctx.fillText(`Poäng: ${score}`, canvas.width / 2, canvas.height / 2 + 50);
        ctx.fillText(`Tid: ${Math.floor(gameTime)} sekunder`, canvas.width / 2, canvas.height / 2 + 150);
        return;
      }

      requestAnimationFrame(update);
    }

    // Key control handlers
    document.addEventListener('keydown', function (e) {
      if (e.code === 'Space') {
        isMoving = true;
      } else if (e.code === 'ArrowUp') {
        upPressed = true;
      } else if (e.code === 'ArrowDown') {
        downPressed = true;
      }
    });

    document.addEventListener('keyup', function (e) {
      if (e.code === 'Space') {
        isMoving = false;
      } else if (e.code === 'ArrowUp') {
        upPressed = false;
      } else if (e.code === 'ArrowDown') {
        downPressed = false;
      }
    });

    // Touch event handlers
    canvas.addEventListener('touchstart', handleTouchStart, false);
    canvas.addEventListener('touchmove', handleTouchMove, false);
    canvas.addEventListener('touchend', handleTouchEnd, false);

    function handleTouchStart(event) {
      event.preventDefault();
      isTouching = true;
      isMoving = true;
      touchStartY = event.touches[0].clientY;
    }

    function handleTouchMove(event) {
      event.preventDefault();
      if (!isTouching) return;

      let touchEndY = event.touches[0].clientY;

      // Calculate vertical movement
      let deltaY = touchEndY - touchStartY;
      
      // Move the boys directly by the delta
      boys.y += deltaY;

      // Keep boys within canvas
      if (boys.y < 0) {
        boys.y = 0;
      } else if (boys.y + boys.height > canvas.height) {
        boys.y = canvas.height - boys.height;
      }

      // Update touch start position for next move event
      touchStartY = touchEndY;
    }

    function handleTouchEnd(event) {
      event.preventDefault();
      isTouching = false;
      isMoving = false;
    }

    // Resize handler
    window.addEventListener('resize', function() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });

    // Start the game loop
    update();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ghost Living Room Escape</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
    canvas {
      display: block;
      background-color: #f0f0f0;
    }
    #lifeBar {
      position: absolute;
      top: 10px;
      left: 10px;
      width: 200px;
      height: 20px;
      background-color: #ddd;
      border: 1px solid #000;
    }
    #lifeBarFill {
      height: 100%;
      background-color: #0f0;
      transition: width 0.3s;
    }
    #menu {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background-color: rgba(255, 255, 255, 0.8);
      padding: 20px;
      border-radius: 10px;
      text-align: center;
    }
    button {
      margin: 10px;
      padding: 10px 20px;
      font-size: 16px;
    }
    #timer {
      position: absolute;
      top: 10px;
      right: 10px;
      font-size: 20px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <svg xmlns="http://www.w3.org/2000/svg" style="display: none;">
    <symbol id="branch" viewBox="0 0 100 100">
      <path d="M0,0 Q50,100 100,0" stroke="brown" stroke-width="10" fill="none" />
      <path d="M20,30 Q35,50 50,30" stroke="green" stroke-width="5" fill="none" />
      <path d="M50,60 Q65,80 80,60" stroke="green" stroke-width="5" fill="none" />
    </symbol>
    <symbol id="tree" viewBox="0 0 100 100">
      <rect x="40" y="60" width="20" height="40" fill="brown" />
      <polygon points="50,0 20,60 80,60" fill="green" />
      <polygon points="50,30 30,70 70,70" fill="darkgreen" />
    </symbol>
  </svg>

  <div id="lifeBar"><div id="lifeBarFill"></div></div>
  <div id="timer">Time: 0s</div>
  <canvas id="gameCanvas"></canvas>
  <div id="menu">
    <h2>Choose Room Length</h2>
    <button onclick="startGame('short')">Short</button>
    <button onclick="startGame('medium')">Medium</button>
    <button onclick="startGame('long')">Long</button>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const lifeBarFill = document.getElementById('lifeBarFill');
    const timerElement = document.getElementById('timer');
    const menu = document.getElementById('menu');

    // Set canvas size
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // Load images
    const ghostImg = new Image();
    ghostImg.src = 'images/ghost.png';
    const doorImg = new Image();
    doorImg.src = 'images/door.png';

    // Ghost settings
    const ghost = {
      x: 100,
      y: canvas.height / 2,
      width: 80,
      height: 80,
      velocityY: 0,
      lives: 10
    };

    let obstacles = [];
    const obstacleWidth = 60;
    const gapSize = 200;
    let gameOver = false;
    let isMoving = false;
    let gameTime = 0;
    let roomLength = 0;
    let doorPosition = 0;
    let backgroundGradient;
    const darkColor = 'rgba(0, 0, 0, 0.8)';
    const lightColor = 'rgba(240, 240, 240, 1)';

    function startGame(length) {
      menu.style.display = 'none';
      switch (length) {
        case 'short':
          roomLength = 3000;
          break;
        case 'medium':
          roomLength = 6000;
          break;
        case 'long':
          roomLength = 9000;
          break;
      }
      doorPosition = canvas.width + roomLength;
      gameTime = 0;
      ghost.x = 100;
      ghost.y = canvas.height / 2;
      ghost.lives = 10;
      obstacles = [];
      gameOver = false;

      // Create background gradient
      backgroundGradient = ctx.createLinearGradient(0, 0, canvas.width + roomLength, 0);
      backgroundGradient.addColorStop(0, lightColor);
      backgroundGradient.addColorStop((canvas.width + roomLength - 200) / (canvas.width + roomLength), lightColor);
      backgroundGradient.addColorStop(1, darkColor);

      generateInitialObstacles();
      updateLifeBar();
      update();
    }

    function generateInitialObstacles() {
      obstacles = [];
      const safeZone = 500;
      
      for (let i = 0; i < 10; i++) {
        const obstacleX = canvas.width + i * 500;
        if (obstacleX < doorPosition - obstacleWidth - safeZone) {
          generateObstacle(obstacleX);
        } else {
          break;
        }
      }
      
      // Add door as the last obstacle
      const doorGapSize = ghost.height + 20;
      const doorGapStartY = (canvas.height - doorGapSize) / 2;
      obstacles.push({
        x: doorPosition - obstacleWidth,
        gapStartY: doorGapStartY,
        gapEndY: doorGapStartY + doorGapSize,
        heightTop: doorGapStartY,
        heightBottom: canvas.height - (doorGapStartY + doorGapSize),
        hit: false,
        isDoor: true
      });
    }

    function generateObstacle(x) {
      const obstacleHeight = Math.random() * (canvas.height - gapSize - 100) + 50;
      const gapStartY = Math.random() * (canvas.height - gapSize);
      obstacles.push({
        x: x,
        gapStartY: gapStartY,
        gapEndY: gapStartY + gapSize,
        heightTop: gapStartY,
        heightBottom: canvas.height - (gapStartY + gapSize),
        hit: false,
        isBranch: true,
        isTree: true
      });
    }

    function updateLifeBar() {
      const percentage = (ghost.lives / 10) * 100;
      lifeBarFill.style.width = `${percentage}%`;
      lifeBarFill.style.backgroundColor = percentage > 50 ? '#0f0' : percentage > 20 ? '#ff0' : '#f00';
    }

    function update() {
      if (gameOver) return;

      gameTime += 1/60; // Assuming 60 FPS
      timerElement.textContent = `Time: ${Math.floor(gameTime)}s`;

      // Clear the canvas
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Calculate the world offset
      let worldOffset = ghost.x - 100;

      // Draw background
      ctx.save();
      ctx.translate(-worldOffset, 0);
      ctx.fillStyle = backgroundGradient;
      ctx.fillRect(worldOffset, 0, canvas.width + roomLength, canvas.height);

      // Draw obstacles
      obstacles.forEach((obstacle, index) => {
        const obstacleX = obstacle.x - worldOffset;
        
        if (obstacle.isDoor) {
          // Draw door
          if (doorImg.complete) {
            ctx.drawImage(doorImg, obstacleX, 0, obstacleWidth, canvas.height);
          } else {
            ctx.fillStyle = 'purple';
            ctx.fillRect(obstacleX, 0, obstacleWidth, canvas.height);
          }
        } else {
          // Draw top obstacle (branch)
          if (obstacle.isBranch) {
            ctx.save();
            ctx.translate(obstacleX, 0);
            ctx.scale(obstacleWidth / 100, obstacle.heightTop / 100);
            ctx.fillStyle = 'green';
            ctx.fill(new Path2D('M0,0 Q50,100 100,0 M20,30 Q35,50 50,30 M50,60 Q65,80 80,60'));
            ctx.restore();
          }

          // Draw bottom obstacle (tree)
          if (obstacle.isTree) {
            ctx.save();
            ctx.translate(obstacleX, obstacle.gapEndY);
            ctx.scale(obstacleWidth / 100, obstacle.heightBottom / 100);
            ctx.fillStyle = 'brown';
            ctx.fillRect(40, 60, 20, 40);
            ctx.fillStyle = 'green';
            ctx.beginPath();
            ctx.moveTo(50, 0);
            ctx.lineTo(20, 60);
            ctx.lineTo(80, 60);
            ctx.closePath();
            ctx.fill();
            ctx.fillStyle = 'darkgreen';
            ctx.beginPath();
            ctx.moveTo(50, 30);
            ctx.lineTo(30, 70);
            ctx.lineTo(70, 70);
            ctx.closePath();
            ctx.fill();
            ctx.restore();
          }
        }

        // Check for collision
        if (
          ghost.x + ghost.width > obstacle.x &&
          ghost.x < obstacle.x + obstacleWidth &&
          (ghost.y < obstacle.heightTop ||
            ghost.y + ghost.height > obstacle.gapEndY) &&
          !obstacle.hit
        ) {
          obstacle.hit = true;
          if (obstacle.isDoor) {
            // Win condition
            gameOver = true;
            alert(`Congratulations! The ghost escaped through the door in ${Math.floor(gameTime)} seconds!`);
            return;
          } else {
            ghost.lives--;
            updateLifeBar();
            if (ghost.lives <= 0) {
              gameOver = true;
              alert("Game Over! The ghost couldn't escape the room!");
              return;
            }
          }
        }

        // Remove obstacles that have gone off-screen
        if (obstacleX + obstacleWidth < -100) {
          obstacles.splice(index, 1);
        }
      });

      // Generate new obstacles as the ghost moves forward
      if (obstacles.length < 5) {
        const lastObstacle = obstacles[obstacles.length - 1];
        const newObstacleX = lastObstacle.x + 500;
        if (newObstacleX < doorPosition - obstacleWidth - 500) {
          generateObstacle(newObstacleX);
        }
      }

      ctx.restore();

      // Move ghost vertically based on velocityY
      ghost.y += ghost.velocityY;

      // Keep ghost within canvas
      if (ghost.y < 0) {
        ghost.y = 0;
      } else if (ghost.y + ghost.height > canvas.height) {
        ghost.y = canvas.height - ghost.height;
      }

      // Update ghost's x position
      if (isMoving && ghost.x < doorPosition - ghost.width) {
        ghost.x += 2; // Move the ghost
      } else if (ghost.x >= doorPosition - ghost.width) {
        // Stop the ghost at the door
        ghost.x = doorPosition - ghost.width;
        // Trigger win condition if the ghost is aligned with the door gap
        const door = obstacles.find(obs => obs.isDoor);
        if (door && ghost.y >= door.gapStartY && ghost.y + ghost.height <= door.gapEndY) {
          gameOver = true;
          alert(`Congratulations! The ghost escaped through the door in ${Math.floor(gameTime)} seconds!`);
          return;
        }
      }

      // Draw ghost
      ctx.drawImage(ghostImg, 100, ghost.y, ghost.width, ghost.height);

      requestAnimationFrame(update);
    }

    // Key control handlers
    document.addEventListener('keydown', handleKeyDown);
    document.addEventListener('keyup', handleKeyUp);

    // Touch event listeners
    canvas.addEventListener('touchstart', handleTouchStart);
    canvas.addEventListener('touchmove', handleTouchMove);
    canvas.addEventListener('touchend', handleTouchEnd);

    let touchStartY = 0;

    function handleKeyDown(e) {
      if (e.code === 'Space') {
        isMoving = true;
      } else if (e.code === 'ArrowUp') {
        ghost.velocityY = -5;
      } else if (e.code === 'ArrowDown') {
        ghost.velocityY = 5;
      }
    }

    function handleKeyUp(e) {
      if (e.code === 'Space') {
        isMoving = false;
      } else if (e.code === 'ArrowUp' || e.code === 'ArrowDown') {
        ghost.velocityY = 0;
      }
    }

    function handleTouchStart(e) {
      e.preventDefault();
      isMoving = true;
      touchStartY = e.touches[0].clientY;
    }

    function handleTouchMove(e) {
      e.preventDefault();
      const touchY = e.touches[0].clientY;
      const deltaY = touchY - touchStartY;
      
      if (deltaY < -20) {
        ghost.velocityY = -5;
      } else if (deltaY > 20) {
        ghost.velocityY = 5;
      } else {
        ghost.velocityY = 0;
      }
    }

    function handleTouchEnd(e) {
      e.preventDefault();
      isMoving = false;
      ghost.velocityY = 0;
    }
  </script>
</body>
</html>

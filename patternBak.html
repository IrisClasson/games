<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whack-a-Mole: Builder Pattern Edition</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: Arial, sans-serif;
        }
        #prompt {
            margin-bottom: 20px;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
        }
        #game {
            display: grid;
            grid-template-columns: repeat(2, 150px);
            grid-gap: 20px;
            margin-top: 20px;
        }
        .hole {
            width: 150px;
            height: 150px;
            background-color: #ccc;
            border-radius: 50%;
            position: relative;
        }
        .mole {
            width: 130px;
            height: 130px;
            background-color: #6c757d;
            border-radius: 50%;
            position: absolute;
            top: 10px;
            left: 10px;
            display: none;
        }
        .green-mole {
            background-color: #28a745;
        }
        #chosen-anti-patterns {
            margin-top: 20px;
            font-size: 16px;
        }
        .anti-pattern-item {
            margin: 5px 0;
        }
        .missed-pattern {
            color: red;
        }
    </style>
</head>
<body>
    <h1>Whack-a-Mole: Builder Pattern Edition</h1>
    <div id="prompt">When not to use: Simple object</div>
    <div id="game">
        <div class="hole" id="hole1"><div class="mole"></div></div>
        <div class="hole" id="hole2"><div class="mole"></div></div>
        <div class="hole" id="hole3"><div class="mole"></div></div>
        <div class="hole" id="hole4"><div class="mole"></div></div>
    </div>
    <h2>Score: <span id="score">0</span></h2>

    <!-- Display chosen anti-patterns -->
    <div id="chosen-anti-patterns">
        <h3>Chosen Anti-patterns:</h3>
        <ul id="anti-pattern-list"></ul>
    </div>

    <script>
        const holes = document.querySelectorAll('.hole');
        let score = 0;
        let lastHole;
        let timeUp = false;
        const promptText = document.getElementById('prompt');
        const antiPatternList = document.getElementById('anti-pattern-list');
        let chosenAntiPatterns = new Set();
        
        // Scenarios for when not to use the Builder Pattern
        const scenarios = [
            "Simple object",
            "Mandatory params",
            "No step by step",
            "Few configurations"
        ];

        function randomTime(min, max) {
            return Math.round(Math.random() * (max - min) + min);
        }

        function randomHole(holes) {
            const idx = Math.floor(Math.random() * holes.length);
            const hole = holes[idx];
            if (hole === lastHole) {
                return randomHole(holes);
            }
            lastHole = hole;
            return hole;
        }

        function showMole() {
            const time = randomTime(500, 1000);
            const hole = randomHole(holes);
            const mole = hole.querySelector('.mole');

            // Randomly decide whether it's a good (green) or bad mole
            const isGoodMole = Math.random() > 0.7; // 30% chance of a green mole
            mole.classList.toggle('green-mole', isGoodMole);
            mole.style.display = 'block';

            // Update the prompt text based on mole type
            if (isGoodMole) {
                promptText.textContent = "Yes: Building stuff"; // Correct usage prompt
            } else {
                const randomScenario = scenarios[Math.floor(Math.random() * scenarios.length)];
                promptText.textContent = "No: " + randomScenario; // When not to use scenario
                mole.dataset.scenario = randomScenario; // Attach scenario to mole for tracking
            }

            setTimeout(() => {
                mole.style.display = 'none';
                if (!timeUp) showMole();
            }, time);
        }

        function startGame() {
            score = 0;
            document.getElementById('score').textContent = score;
            timeUp = false;
            chosenAntiPatterns.clear();
            antiPatternList.innerHTML = '';
            showMole();
            setTimeout(() => {
                timeUp = true;
                showMissedAntiPatterns();
            }, 10000); // 10 seconds game duration
        }

        function addAntiPatternToList(scenario) {
            if (!chosenAntiPatterns.has(scenario)) {
                chosenAntiPatterns.add(scenario);
                const listItem = document.createElement('li');
                listItem.textContent = scenario;
                listItem.classList.add('anti-pattern-item');
                antiPatternList.appendChild(listItem);
            }
        }

        function showMissedAntiPatterns() {
            const missedPatterns = scenarios.filter(scenario => !chosenAntiPatterns.has(scenario));
            missedPatterns.forEach(scenario => {
                const listItem = document.createElement('li');
                listItem.textContent = scenario + " (Missed)";
                listItem.classList.add('anti-pattern-item', 'missed-pattern');
                antiPatternList.appendChild(listItem);
            });
        }

        holes.forEach(hole => {
            hole.addEventListener('click', (e) => {
                if (e.target.matches('.mole')) {
                    const isGoodMole = e.target.classList.contains('green-mole');
                    if (isGoodMole) {
                        // Deduct points if it's a green mole
                        score--;
                    } else {
                        // Add points for bad moles
                        score++;
                        const scenario = e.target.dataset.scenario; // Get the scenario for this mole
                        addAntiPatternToList(scenario); // Add scenario to list if not already chosen
                    }
                    document.getElementById('score').textContent = score;
                    e.target.style.display = 'none';
                }
            });
        });

        startGame(); // Auto-start the game
    </script>
</body>
</html>

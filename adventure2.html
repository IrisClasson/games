<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hoppa i sängen</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }
        canvas {
            display: block;
        }
        #congratsWindow {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            z-index: 1000;
        }
        #congratsContent {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        #congratsContent button {
            margin-top: 10px;
            padding: 5px 10px;
            font-size: 16px;
        }
    </style>
  <link rel="stylesheet" href="styles/styles.css">
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div class="info-box">
        <h3>How to Play</h3>
        <p>SPACE DOWN: Load jump</p>
        <p>SPACE UP: Jump</p>
        <p>UP/DOWN: Choose angle</p>
    </div>
    <div id="congratsWindow" style="display: none;">
        <div id="congratsContent">
            <h2>Grattis! Du klarade det!</h2>
            <p id="scoreText"></p>
            <p id="timeText"></p>
            <button onclick="resetGame()">Spela igen</button>
        </div>
    </div>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Set canvas size
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Game constants
        const VELOCITY_SCALE = 0.23;
        const ROTATION_SPEED = 0.1;

        // Load images
        const boysImg = new Image();
        boysImg.src = 'images/boys2.png';
        const bedImg = new Image();
        bedImg.src = 'images/bed.png';
        const floorTileImg = new Image();
        floorTileImg.src = 'images/floortile.png';
        const wallTileImg = new Image();
        wallTileImg.src = 'images/tile.jpg';

        // Game objects
        const startBed = {
            x: 100,
            y: canvas.height - 300,
            width: 300,
            height: 180
        };

        const boys = {
            x: startBed.x + startBed.width / 2 - 90,
            y: startBed.y - 50,
            width: 180,
            height: 180,
            velocity: { x: 0, y: 0 },
            launched: false,
            rotation: 0
        };

        const bed = {
            x: canvas.width - 450,
            y: canvas.height - 300,
            width: 300,
            height: 180
        };

        // Game variables
        let angle = 45;
        let power = 0;
        let maxPower;
        let pulling = false;
        let touchStartY = 0;
        let touchStartAngle = 0;
        let arrowUpPressed = false;
        let arrowDownPressed = false;
        let gameStartTime;
        let gameEndTime;
        let speed = 1; // New variable for speed

        function calculateVelocity(distance, angleDegrees) {
            const g = 9.81;
            const angleRadians = angleDegrees * (Math.PI / 180);
            const velocity = Math.sqrt((distance * g) / Math.sin(2 * angleRadians));
            return velocity;
        }

        function calculateRequiredPower() {
            const dx = bed.x + bed.width / 2 - boys.x;
            const dy = bed.y + bed.height / 2 - boys.y;
            const distance = Math.sqrt(dx * dx + dy * dy);
            return calculateVelocity(distance, angle);
        }

        function launchBoys() {
            boys.launched = true;
            const velocity = power * VELOCITY_SCALE * speed; // Apply speed to velocity
            boys.velocity.x = Math.cos(angle * Math.PI / 180) * velocity;
            boys.velocity.y = -Math.sin(angle * Math.PI / 180) * velocity;
            pulling = false;
            power = 0;
            gameStartTime = Date.now();
        }

        // Event listeners
        document.addEventListener('keydown', handleKeyDown);
        document.addEventListener('keyup', handleKeyUp);
        canvas.addEventListener('touchstart', handleTouchStart, false);
        canvas.addEventListener('touchmove', handleTouchMove, false);
        canvas.addEventListener('touchend', handleTouchEnd, false);

        function handleKeyDown(e) {
            if (e.code === 'Space' && !boys.launched) {
                pulling = true;
            } else if (e.code === 'ArrowUp') {
                arrowUpPressed = true;
            } else if (e.code === 'ArrowDown') {
                arrowDownPressed = true;
            } else if (e.code === 'KeyS') { // New key handler for speed toggle
                speed = speed === 1 ? 2 : 1;
            }
        }

        function handleKeyUp(e) {
            if (e.code === 'Space' && !boys.launched) {
                launchBoys();
            } else if (e.code === 'ArrowUp') {
                arrowUpPressed = false;
            } else if (e.code === 'ArrowDown') {
                arrowDownPressed = false;
            }
        }

        function handleTouchStart(event) {
            event.preventDefault();
            if (!boys.launched) {
                pulling = true;
                touchStartY = event.touches[0].clientY;
                touchStartAngle = angle;
            }
        }

        function handleTouchMove(event) {
            event.preventDefault();
            if (!boys.launched && pulling) {
                const touchY = event.touches[0].clientY;
                const deltaY = touchY - touchStartY;
                
                // Change angle based on touch movement
                angle = touchStartAngle - deltaY / 10;
                
                // Clamp angle between 0 and 90 degrees
                angle = Math.max(0, Math.min(90, angle));
            }
        }

        function handleTouchEnd(event) {
            event.preventDefault();
            if (!boys.launched && pulling) {
                launchBoys();
            }
            pulling = false;
        }

        function drawBackground() {
            // Draw wall tiles
            const wallTileSize = 600;
            for (let x = 0; x < canvas.width; x += wallTileSize) {
                for (let y = 0; y < canvas.height - wallTileSize; y += wallTileSize) {
                    ctx.drawImage(wallTileImg, x, y, wallTileSize, wallTileSize);
                }
            }

            // Draw floor tiles
            const floorTileSize = 200;
            for (let x = 0; x < canvas.width; x += floorTileSize) {
                ctx.drawImage(floorTileImg, x, canvas.height - floorTileSize, floorTileSize, floorTileSize);
            }
        }

        function update() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw the background
            drawBackground();

            maxPower = calculateRequiredPower();

            if (boys.launched) {
                boys.x += boys.velocity.x * speed; // Apply speed to x movement
                boys.y += boys.velocity.y * speed; // Apply speed to y movement
                boys.velocity.y += 0.5 * speed; // Apply speed to gravity
                boys.rotation += ROTATION_SPEED * speed; // Apply speed to rotation

                const boysCenterX = boys.x + boys.width / 2;
                const boysCenterY = boys.y + boys.height / 2;

                if (
                    boysCenterX > bed.x &&
                    boysCenterX < bed.x + bed.width &&
                    boysCenterY > bed.y &&
                    boysCenterY < bed.y + bed.height
                ) {
                    gameEndTime = Date.now();
                    showCongrats();
                    return;
                }

                if (boys.x > canvas.width || boys.y > canvas.height) {
                    resetGame();
                }
            } else {
                if (pulling) {
                    power = Math.min(power + 1, maxPower);
                }
                if (arrowUpPressed) {
                    angle = Math.min(angle + 1, 90);
                }
                if (arrowDownPressed) {
                    angle = Math.max(angle - 1, 0);
                }
            }

            // Draw the starting bed
            ctx.drawImage(bedImg, startBed.x, startBed.y, startBed.width, startBed.height);

            // Draw the target bed
            ctx.drawImage(bedImg, bed.x, bed.y, bed.width, bed.height);

            // Draw the angle line behind the boys
            if (!boys.launched) {
                const lineLength = 400;
                ctx.strokeStyle = 'red';
                ctx.setLineDash([20, 10]); // This creates a dotted line with 20px dashes and 10px gaps
                ctx.beginPath();
                ctx.moveTo(boys.x + boys.width / 2, boys.y + boys.height / 2);
                ctx.lineTo(
                    boys.x + boys.width / 2 + Math.cos(angle * Math.PI / 180) * lineLength,
                    boys.y + boys.height / 2 - Math.sin(angle * Math.PI / 180) * lineLength
                );
                ctx.lineWidth = 10;
                ctx.stroke();
                ctx.setLineDash([]); // Reset to solid line
            }

            // Draw the boys
            ctx.save();
            ctx.translate(boys.x + boys.width / 2, boys.y + boys.height / 2);
            ctx.rotate(boys.rotation);
            ctx.drawImage(boysImg, -boys.width / 2, -boys.height / 2, boys.width, boys.height);
            ctx.restore();

            ctx.fillStyle = 'blue';
            ctx.fillRect(20, 20, (power / maxPower) * 200, 20);

            ctx.strokeStyle = 'red';
            ctx.beginPath();
            ctx.moveTo(20 + 200, 20);
            ctx.lineTo(20 + 200, 40);
            ctx.stroke();

            ctx.fillStyle = 'black';
            ctx.font = '16px Arial';
            ctx.fillText(`Angle: ${Math.round(angle)}°`, 20, 60);
            ctx.fillText(`Speed: ${speed}x`, 20, 80); // Display current speed

            requestAnimationFrame(update);
        }

        function showCongrats() {
            const timeTaken = (gameEndTime - gameStartTime) / 1000; // Convert to seconds
            const score = Math.max(0, Math.floor(1000 - timeTaken * 10)); // Example scoring system

            document.getElementById('scoreText').textContent = `Poäng: ${score}`;
            document.getElementById('timeText').textContent = `Tid: ${timeTaken.toFixed(2)} sekunder`;
            document.getElementById('congratsWindow').style.display = 'block';
        }

        function hideCongrats() {
            document.getElementById('congratsWindow').style.display = 'none';
        }

        function resetGame() {
            boys.x = startBed.x + startBed.width / 2 - 90;
            boys.y = startBed.y - 50;
            boys.velocity = { x: 0, y: 0 };
            boys.launched = false;
            boys.rotation = 0;
            power = 0;
            angle = 45;
            pulling = false;
            arrowUpPressed = false;
            arrowDownPressed = false;
            speed = 1; // Reset speed to normal
            hideCongrats();
            gameStartTime = null;
            gameEndTime = null;
            
            // Ensure the game loop continues
            requestAnimationFrame(update);
        }

        let imagesLoaded = 0;
        function imageLoaded() {
            imagesLoaded++;
            if (imagesLoaded === 4) {
                update();
            }
        }
        boysImg.onload = imageLoaded;
        bedImg.onload = imageLoaded;
        floorTileImg.onload = imageLoaded;
        wallTileImg.onload = imageLoaded;

        // Add resize event listener
        window.addEventListener('resize', function() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            // Adjust game object positions if needed
            startBed.y = canvas.height - 300;
            boys.x = startBed.x + startBed.width / 2 - 90;
            boys.y = startBed.y - 100;
            bed.x = canvas.width - 450;
            bed.y = canvas.height - 300;
        });
    </script>
</body>
</html>

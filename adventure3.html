<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meatball Invasion</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        canvas {
            display: block;
        }
        #lifeBar {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 200px;
            height: 20px;
            background-color: #ddd;
            border: 1px solid #000;
        }
        #lifeBarFill {
            height: 100%;
            background-color: #0f0;
            transition: width 0.3s;
        }
        #timer {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 20px;
            font-weight: bold;
            color: white;
        }
        #congratsWindow {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            z-index: 1000;
        }
        #congratsContent {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="lifeBar"><div id="lifeBarFill"></div></div>
    <div id="timer">Time: 20:00</div>
    <canvas id="gameCanvas"></canvas>
    <div id="congratsWindow">
        <div id="congratsContent">
            <h2>Game Over!</h2>
            <p id="scoreText"></p>
            <p id="timeText"></p>
        </div>
    </div>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const lifeBarFill = document.getElementById('lifeBarFill');
        const timerElement = document.getElementById('timer');
        const congratsWindow = document.getElementById('congratsWindow');
        const scoreText = document.getElementById('scoreText');
        const timeText = document.getElementById('timeText');

        // Set canvas size
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Load images
        const carImg = new Image();
        carImg.src = 'images/car.png';
        const meatballImg = new Image();
        meatballImg.src = 'images/meatball.png';
        const macaroniImg = new Image();
        macaroniImg.src = 'images/macaroni.png';
        const skyImg = new Image();
        skyImg.src = 'images/sky2.png';

        // Game objects
        const car = {
            x: canvas.width / 2,
            y: canvas.height - 200,
            width: 200,
            height: 150,
            speed: 5,
            lives: 10,
            isMoving: false
        };

        const meatballs = [];
        const meatballSize = 75;
        const meatballSpeed = 2;

        let gameTime = 60 * 60; // 20 minutes in seconds
        let gameOver = false;

        // Add these variables for the shaking effect
        let shakeTime = 0;
        const maxShakeTime = 10;
        const maxShakeIntensity = 5;

        function spawnMeatball() {
            meatballs.push({
                x: Math.random() * (canvas.width - meatballSize),
                y: -meatballSize
            });
        }

        function updateLifeBar() {
            const percentage = (car.lives / 10) * 100;
            lifeBarFill.style.width = `${percentage}%`;
            lifeBarFill.style.backgroundColor = percentage > 50 ? '#0f0' : percentage > 20 ? '#ff0' : '#f00';
        }

        function updateTimer() {
            const minutes = Math.floor(gameTime / 60);
            const seconds = gameTime % 60;
            timerElement.textContent = `Time: ${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        function drawBackground() {
            const canvasRatio = canvas.width / canvas.height;
            const imgRatio = skyImg.width / skyImg.height;
            let drawWidth, drawHeight, offsetX, offsetY;

            if (canvasRatio > imgRatio) {
                drawWidth = canvas.width;
                drawHeight = canvas.width / imgRatio;
                offsetX = 0;
                offsetY = (canvas.height - drawHeight) / 2;
            } else {
                drawHeight = canvas.height;
                drawWidth = canvas.height * imgRatio;
                offsetX = (canvas.width - drawWidth) / 2;
                offsetY = 0;
            }

            ctx.drawImage(skyImg, offsetX, offsetY, drawWidth, drawHeight);

            // Draw tiled macaroni at the bottom
            const macaroniHeight = 100;
            const macaroniWidth = macaroniHeight * (macaroniImg.width / macaroniImg.height);
            const tilesNeeded = Math.ceil(canvas.width / macaroniWidth);

            for (let i = 0; i < tilesNeeded; i++) {
                ctx.drawImage(macaroniImg, i * macaroniWidth, canvas.height - macaroniHeight, macaroniWidth, macaroniHeight);
            }
        }

        function drawExplosion(x, y) {
            const explosionRadius = 200;
            const particleCount = 200;
            const particleSize = 6;

            for (let i = 0; i < particleCount; i++) {
                const angle = (Math.PI * 2) * (i / particleCount);
                const distance = Math.random() * explosionRadius;

                const particleX = x + Math.cos(angle) * distance;
                const particleY = y + Math.sin(angle) * distance;

                const color = 'brown';

                ctx.beginPath();
                  ctx.arc(particleX, particleY, particleSize, 0, Math.PI * 2);
                ctx.fillStyle = color;
                ctx.fill();
            }
        }

        function gameLoop() {
            if (gameOver) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Apply shaking effect
            if (shakeTime > 0) {
                const shakeOffsetX = (Math.random() - 0.5) * maxShakeIntensity;
                const shakeOffsetY = (Math.random() - 0.5) * maxShakeIntensity;
                ctx.save();
                ctx.translate(shakeOffsetX, shakeOffsetY);
                shakeTime--;
            }

            drawBackground();

            // Move car only if space is held down
            if (car.isMoving) {
                if (keys.ArrowLeft && car.x > 0) car.x -= car.speed;
                if (keys.ArrowRight && car.x < canvas.width - car.width) car.x += car.speed;
            }

            // Draw car
            ctx.drawImage(carImg, car.x, car.y, car.width, car.height);

            // Update and draw meatballs
            for (let i = meatballs.length - 1; i >= 0; i--) {
                const meatball = meatballs[i];
                meatball.y += meatballSpeed;

                // Check collision with car
                if (
                    meatball.x < car.x + car.width &&
                    meatball.x + meatballSize > car.x &&
                    meatball.y < car.y + car.height &&
                    meatball.y + meatballSize > car.y
                ) {
                    // Trigger shaking effect
                    shakeTime = maxShakeTime;

                    // Draw explosion at the point of collision
                    const collisionX = car.x + car.width / 2;
                    const collisionY = meatball.y + meatballSize / 2;
                    drawExplosion(collisionX, collisionY);

                    car.lives--;
                    updateLifeBar();
                    meatballs.splice(i, 1);
                    if (car.lives <= 0) {
                        endGame("Game Over! The meatballs got you!");
                        return;
                    }
                    continue;
                }

                // Remove meatballs that are off-screen
                if (meatball.y > canvas.height) {
                    meatballs.splice(i, 1);
                    continue;
                }

                ctx.drawImage(meatballImg, meatball.x, meatball.y, meatballSize, meatballSize);
            }

            // Restore canvas state after shaking
            if (shakeTime > 0) {
                ctx.restore();
            }

            // Spawn new meatballs
            if (Math.random() < 0.02) spawnMeatball();

            // Update game time
            gameTime--;
            updateTimer();

            if (gameTime <= 0) {
                endGame("Congratulations! You survived the meatball invasion!");
                return;
            }

            requestAnimationFrame(gameLoop);
        }

        function endGame(message) {
            gameOver = true;
            const score = car.lives * 100 + Math.max(0, Math.floor(1200 - (20 * 60 - gameTime) * 5));
            scoreText.textContent = `Score: ${score}`;
            timeText.textContent = `Time survived: ${Math.floor((20 * 60 - gameTime) / 60)} minutes ${(20 * 60 - gameTime) % 60} seconds`;
            congratsWindow.style.display = 'block';
        }

        // Keyboard controls
        const keys = {};
        document.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if (e.code === 'Space') {
                car.isMoving = true;
            }
        });
        document.addEventListener('keyup', (e) => {
            keys[e.code] = false;
            if (e.code === 'Space') {
                car.isMoving = false;
            }
        });

        // Touch controls
        let touchStartX = 0;
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            touchStartX = e.touches[0].clientX;
            car.isMoving = true;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (car.isMoving) {
                const touchX = e.touches[0].clientX;
                const deltaX = touchX - touchStartX;
                car.x += deltaX;
                car.x = Math.max(0, Math.min(canvas.width - car.width, car.x));
                touchStartX = touchX;
            }
        });

        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            car.isMoving = false;
        });

        // Start the game when all images are loaded
        let loadedImages = 0;
        const totalImages = 4; // car, meatball, macaroni, and sky

        function imageLoaded() {
            loadedImages++;
            if (loadedImages === totalImages) {
                updateLifeBar();
                gameLoop();
            }
        }

        carImg.onload = imageLoaded;
        meatballImg.onload = imageLoaded;
        macaroniImg.onload = imageLoaded;
        skyImg.onload = imageLoaded;

        // Resize handler
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            car.y = canvas.height - 200;
            drawBackground();
        });
    </script>
</body>
</html>
